<style>
/* ---------- Body & Background ---------- */
@keyframes gradientBG {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

body {
    font-family: 'Poppins', sans-serif;
    margin: 0;
    padding: 0;
    color: #333;
    text-align: center;
    background: linear-gradient(-45deg, #f0f4f8, #d9e2ec, #cfd8dc, #e1f5fe);
    background-size: 400% 400%;
    animation: gradientBG 20s ease infinite;
    min-height: 100vh;
}

/* ---------- Header ---------- */
header {
    padding: 50px 20px 30px;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeSlide 1s forwards;
}

@keyframes fadeSlide {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

header h1 {
    font-size: 2.5em;
    margin-bottom: 10px;
    color: #1e3c72;
}

header p {
    font-size: 1.2em;
    color: #334e68;
}

/* ---------- Box Styles ---------- */
@keyframes floatBox {
    0%,100% { transform: translateY(0);}
    50% { transform: translateY(-5px);}
}

.box {
    background-color: #ffffff;
    width: 320px;
    max-width: 90%;
    margin: 25px auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    animation: floatBox 3s ease-in-out infinite;
}

.box:hover {
    transform: translateY(-7px) scale(1.03);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

.box h2 {
    color: #1e3c72;
    font-size: 1.5em;
    margin-bottom: 12px;
}

.box p {
    font-size: 1em;
    color: #334e68;
    margin: 5px 0;
}

/* ---------- WhatsApp Button ---------- */
.whatsapp-btn {
    display: inline-block;
    background-color: #25D366;
    color: white;
    padding: 15px 28px;
    margin: 30px 0;
    border-radius: 50px;
    text-decoration: none;
    font-size: 1.2em;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    animation: pulse 2s infinite;
}

.whatsapp-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 20px rgba(0,0,0,0.15);
}

@keyframes pulse {
    0% { box-shadow: 0 0 15px #25D366; }
    50% { box-shadow: 0 0 25px #25D366; }
    100% { box-shadow: 0 0 15px #25D366; }
}

/* ---------- Floating WhatsApp Button ---------- */
.floating-whatsapp {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background-color: #25D366;
    color: white;
    padding: 18px;
    border-radius: 50%;
    font-size: 28px;
    text-decoration: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.1);
    animation: floatBtn 2.5s ease-in-out infinite;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.floating-whatsapp:hover {
    transform: scale(1.1);
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
}

@keyframes floatBtn {
    0%,100% {transform: translateY(0);}
    50% {transform: translateY(-10px);}
}

/* ---------- Responsive ---------- */
@media (max-width: 700px) {
    .box { width: 90%; padding: 20px; }
    header h1 { font-size: 2em; }
    header p { font-size: 1em; }
    .whatsapp-btn { font-size: 1em; padding: 12px 22px; }
    .floating-whatsapp { font-size: 24px; padding: 15px; }
}
</style>
